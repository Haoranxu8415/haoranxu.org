<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Haoran Xu</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" /></noscript>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--nav-h) - var(--topbar-h));
      text-align: center;
      padding: 0 var(--side-pad);
      animation: pageIn .4s var(--ease-out) both;
    }
    .not-found-code {
      font-family: var(--font-display);
      font-size: clamp(72px, 15vw, 120px);
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 16px;
    }
    .not-found-msg {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .not-found-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-btn);
      padding: 8px 18px;
      transition: color .2s var(--ease-inout), border-color .2s var(--ease-inout);
    }
    .not-found-link:hover {
      color: var(--gold-light);
      border-color: var(--gold-border-em);
    }
  </style>
</head>
<body>

  <div class="top-bar" aria-hidden="true"></div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="home.html" class="nav-logo" aria-label="Home">Haoran Xu</a>
    <ul class="nav-links">
      <li><a href="works.html">Works</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="not-found">
    <div class="not-found-code">404</div>
    <p class="not-found-msg">Page not found</p>
    <a href="home.html" class="not-found-link">← Back to home</a>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
