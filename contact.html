<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Haoran Xu</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<!--
  contact.html — Contact & social links
  ─────────────────────────────────────────────────────────────
  Three-column .contact-grid (stacks vertically on mobile):
    col 1 — Identity: name, location, timezone
    col 2 — Emails
    col 3 — Social icon links

  To add / change an email: edit the .email-row blocks in col 2.
  To add / change a social: edit the <a> tags in .social-card.
-->
<body>

  <div class="top-bar" aria-hidden="true"></div>

  <!-- ── Navbar ── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="nav-logo">Haoran Xu</a>

    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-wrapper">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="works.html">Works</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <div class="page-wrapper page-wrapper--centered">
    <div class="page-content">

      <h1 class="section-heading">Get in touch</h1>

      <!--
        Contact layout: 2-row grid
          Row 1 — identity card + email card side by side
          Row 2 — social icons full-width centered
      -->
      <div class="contact-grid">

        <!-- Row 1: Identity + Email -->
        <div class="contact-row-top">

          <!-- Identity -->
          <div class="card contact-card">
            <h2>Haoran Xu</h2>
            <p>UTC+8 · China Standard Time</p>
            <p>Based in Hefei, China</p>
            <p style="margin-top:10px; color:var(--text-muted); font-size:12px;">
              Incoming @ UBC Sauder · 2026
            </p>
          </div>

          <!-- Email -->
          <div class="card contact-card">
            <p class="card-tag">Email</p>
            <h2>Reach me at</h2>
            <div class="email-row">
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <a href="mailto:hx8415@student.ubc.ca">hx8415@student.ubc.ca</a>
            </div>
            <div class="email-row">
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <a href="mailto:haoranxu8415@gmail.com">haoranxu8415@gmail.com</a>
            </div>
          </div>

        </div><!-- /.contact-row-top -->

        <!-- Row 2: Social icons — full width, centered -->
        <div class="card contact-card social-card">
          <a href="https://github.com/Haoranxu8415" target="_blank" rel="noopener" aria-label="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://x.com/xiayu8415" target="_blank" rel="noopener" aria-label="X / Twitter">
            <i class="fab fa-x-twitter"></i>
          </a>
          <a href="https://instagram.com/haoran8415" target="_blank" rel="noopener" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
        </div>

      </div><!-- /.contact-grid -->

    </div>
  </div>

  <script defer src="assets/js/main.js"></script>
</body>
</html>
