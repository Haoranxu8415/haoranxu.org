<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gallery — Haoran Xu</title>
  <meta name="description" content="A photography gallery by Haoran Xu — landscapes, street scenes, and quiet moments." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://haoranxu.org/gallery.html" />
  <meta property="og:title"       content="Gallery — Haoran Xu" />
  <meta property="og:description" content="A photography gallery by Haoran Xu — landscapes, street scenes, and quiet moments." />
  <meta property="og:image"       content="https://haoranxu.org/assets/images/gallery/thumbs/photo1.webp" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" /></noscript>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body class="page-gallery">

  <div class="top-bar" aria-hidden="true"></div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="home.html" class="nav-logo">Haoran Xu</a>

    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-wrapper">
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="works.html">Works</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-content">

      <div class="gallery-header">
        <h1 class="section-heading">Gallery</h1>
        <p class="gallery-license">
          © 2026 Haoran Xu ·
          <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="license noopener">CC BY-NC-SA 4.0</a>
          <span class="gallery-footer-icons">
            <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="">
            <img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="">
            <img src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt="">
            <img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="">
          </span>
        </p>
      </div>

      <div class="masonry-grid" id="masonry-grid">

        <!-- src = thumbnail, data-full = full-res for lightbox. First 3 eager, rest lazy. -->

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo6.webp"
               data-full="assets/images/gallery/photo6.JPG"
               alt="Cutting Bamboo" loading="eager"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo7.webp"
               data-full="assets/images/gallery/photo7.JPG"
               alt="Painting with a Brush" loading="eager"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item portrait">
          <img src="assets/images/gallery/thumbs/photo2.webp"
               data-full="assets/images/gallery/photo2.JPG"
               alt="Trees and Roadmark" loading="eager"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo8.webp"
               data-full="assets/images/gallery/photo8.JPG"
               alt="Hongcun Village" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo9.webp"
               data-full="assets/images/gallery/photo9.JPG"
               alt="Stone in the River" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item portrait">
          <img src="assets/images/gallery/thumbs/photo3.webp"
               data-full="assets/images/gallery/photo3.JPG"
               alt="Maple Leaves" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo1.webp"
               data-full="assets/images/gallery/photo1.jpg"
               alt="Lamp by the Riverside" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo10.webp"
               data-full="assets/images/gallery/photo10.JPG"
               alt="Holding Tea" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item portrait">
          <img src="assets/images/gallery/thumbs/photo4.webp"
               data-full="assets/images/gallery/photo4.jpeg"
               alt="Leaves over Stairs" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo11.webp"
               data-full="assets/images/gallery/photo11.JPG"
               alt="Baking Tea" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo12.webp"
               data-full="assets/images/gallery/photo12.JPG"
               alt="Suzhou's Sunset" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item portrait">
          <img src="assets/images/gallery/thumbs/photo5.webp"
               data-full="assets/images/gallery/photo5.JPG"
               alt="Cutting Bamboo" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo13.webp"
               data-full="assets/images/gallery/photo13.JPG"
               alt="Seagull in the Sky" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item">
          <img src="assets/images/gallery/thumbs/photo14.webp"
               data-full="assets/images/gallery/photo14.JPG"
               alt="Fireworks" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

        <div class="masonry-item portrait">
          <img src="assets/images/gallery/thumbs/photo15.webp"
               data-full="assets/images/gallery/photo15.jpeg"
               alt="Abstract Leaves" loading="lazy"
               onerror="this.closest('.masonry-item').style.display='none'" />
        </div>

      </div>

      <p id="gallery-empty" style="
        color: var(--text-dim);
        font-size: 12px;
        letter-spacing: .06em;
        text-align: center;
        padding: 48px 0;
        display: none;
      ">
        Photos coming soon.
      </p>


    </div>
  </div>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">×</button>
    <button id="lightbox-prev"  class="lightbox-prev"  aria-label="Previous photo">‹</button>
    <img id="lightbox-img" class="lightbox-img" src="" alt="" />
    <button id="lightbox-next"  class="lightbox-next"  aria-label="Next photo">›</button>
  </div>

  <script defer src="assets/js/main.js"></script>

  <script>
    window.addEventListener('load', () => {
      const items = document.querySelectorAll('.masonry-item');
      const visible = [...items].filter(el => el.style.display !== 'none');
      if (visible.length === 0) {
        document.getElementById('gallery-empty').style.display = 'block';
      }
    });
  </script>

</body>
</html>
