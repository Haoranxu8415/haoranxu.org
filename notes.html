<!--
  notes.html — Writing / blog
  ────────────────────────────────────────────────────────────
  Layout: sticky date timeline sidebar (desktop) + posts column.

  To add a new note:
    1. Create posts/post4.md  (frontmatter: title / date / tags)
    2. Add a .card.post-card block below  (copy an existing one)
    3. Add a matching .timeline-entry in the sidebar
    4. Register the post in assets/js/notes.js  POSTS array
-->
<body>

  <div class="top-bar" aria-hidden="true"></div>

  <!-- ── Navbar ── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="nav-logo">Haoran Xu</a>

    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-wrapper">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="works.html">Works</a></li>
        <li><a href="notes.html" class="active">Notes</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <div class="page-wrapper">
    <div class="page-content">

      <h1 class="section-heading">Notes</h1>

      <div class="blog-layout">

        <!-- ── Timeline sidebar — populated by notes.js ── -->
        <nav class="timeline-col" aria-label="Post timeline"></nav>

        <!-- ── Posts column — populated by notes.js ── -->
        <div class="card-col" style="flex:1; min-width:0;"></div>

      </div><!-- /.blog-layout -->

      <div id="bottom-anchor"></div>

    </div>
  </div>

  <!-- Scroll to newest -->
  <a href="#bottom-anchor" class="newest-button" aria-label="Jump to newest note">Newest ↓</a>

  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/main.js"></script>
  <script defer src="assets/js/notes.js"></script>
